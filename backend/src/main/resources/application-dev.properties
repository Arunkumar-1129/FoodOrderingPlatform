# ========== H2 IN-MEMORY DATABASE (Dev/Test) ==========
spring.datasource.url=jdbc:h2:mem:food_ordering_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== H2 CONSOLE ==========
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========== JWT ==========
app.jwt.secret=dev_super_secret_jwt_key_that_is_at_least_256_bits_long_ok
app.jwt.expiration=86400000

# ========== LOGGING ==========
logging.level.com.foodapp=DEBUG
